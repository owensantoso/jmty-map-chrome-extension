<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jimoty Pickup Map</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="jmty-extension-page">
  <main class="jmty-extension-shell">
    <h1 id="popup-title">Jimoty Pickup Map</h1>
    <form id="popup-form" class="jmty-settings-form">
      <label id="popup-auto-open-label" class="jmty-checkbox-label"><input type="checkbox" name="autoOpenMap"><span class="jmty-label-text">Auto-open map</span></label>
      <label id="popup-show-location-label" class="jmty-checkbox-label"><input type="checkbox" name="showCurrentLocationByDefault"><span class="jmty-label-text">Show my location by default</span></label>
      <label id="popup-panel-position-label">
        <span class="jmty-label-text">Panel position</span>
        <select name="panelPosition">
          <option value="inline">Inline</option>
          <option value="floating">Floating</option>
        </select>
      </label>
      <label id="popup-map-height-label">
        <span class="jmty-label-text">Map height</span>
        <select name="mapHeight">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </label>
      <label id="popup-directions-mode-label">
        <span class="jmty-label-text">Directions mode</span>
        <select name="directionsMode">
          <option value="walking">Walking</option>
          <option value="transit">Transit</option>
          <option value="car">Car</option>
        </select>
      </label>
      <label id="popup-ui-language-label">
        <span class="jmty-label-text">UI language</span>
        <select name="uiLanguage">
          <option value="auto">Use Chrome language</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
        </select>
      </label>
      <label id="popup-context-label" class="jmty-checkbox-label"><input type="checkbox" name="useContextInGeocoding"><span class="jmty-label-text">Use area and line in geocoding</span></label>
    </form>
    <p id="popup-note" class="jmty-extension-note">Reload the Jimoty tab after changing defaults.</p>
    <a id="popup-open-options" class="jmty-map-button jmty-map-button-link" href="options.html" target="_blank" rel="noreferrer">Open full options</a>
  </main>
  <script src="popup.js"></script>
</body>
</html>
