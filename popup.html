<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JMty Pickup Map</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="jmty-extension-page">
  <main class="jmty-extension-shell">
    <h1>JMty Pickup Map</h1>
    <form id="popup-form" class="jmty-settings-form">
      <label><input type="checkbox" name="autoOpenMap"> Auto-open map</label>
      <label><input type="checkbox" name="showCurrentLocationByDefault"> Show my location by default</label>
      <label>
        Panel position
        <select name="panelPosition">
          <option value="inline">Inline</option>
          <option value="floating">Floating</option>
        </select>
      </label>
      <label>
        Map height
        <select name="mapHeight">
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </label>
      <label><input type="checkbox" name="useContextInGeocoding"> Use area and line in geocoding</label>
    </form>
    <p class="jmty-extension-note">Reload the JMty tab after changing defaults.</p>
    <a class="jmty-map-button jmty-map-button-link" href="options.html" target="_blank" rel="noreferrer">Open full options</a>
  </main>
  <script src="popup.js"></script>
</body>
</html>
